name: Clockwork
options:
  bundleIdPrefix: com.clockwork
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ScoringEngine:
    path: ../ScoringEngine

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:
  Clockwork:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: ScoringEngine
        product: ScoringEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clockwork.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Clockwork
        TARGETED_DEVICE_FAMILY: "1"
